name: Desktop Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/tag/SHA to build'
        required: false
        default: 'main'
      baseline_dmg_mb:
        description: 'Baseline macOS DMG size in MB to compare against (e.g. 200). Leave blank to skip.'
        required: false
        default: ''
        type: string
  push:
    tags:
      - 'v*'

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────
  # macOS (DMG + zip) — produces both x64 and arm64 installers
  # ────────────────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps
        run: npm ci

      - name: Build & package (DMG + zip)
        working-directory: apps/desktop
        env:
          # Ad-hoc signing — remove these env vars and configure
          # APPLE_ID / APPLE_TEAM_ID secrets for notarized builds
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:mac

      - name: Report artifact sizes (macOS)
        if: always()
        working-directory: apps/desktop/release
        env:
          BASELINE_DMG_MB: ${{ github.event.inputs.baseline_dmg_mb }}
        run: |
          set -euo pipefail
          echo "===== macOS artifact sizes ====="
          shopt -s nullglob

          # Per-file listing
          for f in *.dmg *.zip; do
            [[ -f "$f" ]] || continue
            bytes=$(stat -f%z "$f")
            mb=$(awk -v b="$bytes" 'BEGIN {printf "%.1f", b/1024/1024}')
            printf "  %-50s  %10s bytes  (%6s MB)\n" "$f" "$bytes" "$mb"
          done

          # Total of dmg + zip
          total_bytes=$(find . -maxdepth 1 -type f \( -name "*.dmg" -o -name "*.zip" \) -print0 2>/dev/null \
            | xargs -0 stat -f%z 2>/dev/null \
            | awk '{s+=$1} END {print s+0}')
          total_mb=$(awk -v b="$total_bytes" 'BEGIN {printf "%.1f", b/1024/1024}')
          echo "TOTAL=${total_mb}MB"

          # Save the largest DMG size to step output for later jobs
          dmg_mb=$(find . -maxdepth 1 -name "*.dmg" -type f -print0 2>/dev/null \
            | xargs -0 stat -f%z 2>/dev/null \
            | awk '{s+=$1} END {print (s+0)/1024/1024}')
          dmg_mb_fmt=$(awk -v v="$dmg_mb" 'BEGIN {printf "%.1f", v}')
          echo "dmg_total_mb=$dmg_mb_fmt" >> "$GITHUB_OUTPUT"
          echo "Recorded dmg_total_mb=$dmg_mb_fmt"

          # Baseline comparison (only if user passed baseline_dmg_mb)
          baseline="${BASELINE_DMG_MB:-}"
          if [[ -n "$baseline" ]]; then
            if [[ ! "$baseline" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
              echo "::warning::baseline_dmg_mb='$baseline' is not a number; skipping comparison."
            else
              ratio=$(awk -v t="$dmg_mb_fmt" -v b="$baseline" 'BEGIN {if(b>0) printf "%.2f", t/b; else print "N/A"}')
              diff_mb=$(awk -v t="$dmg_mb_fmt" -v b="$baseline" 'BEGIN {d=t-b; if(d<0) d=-d; printf "%.1f", d}')
              echo "BASELINE=${baseline}MB  DIFF=${diff_mb}MB  RATIO=${ratio}x"
              if awk -v t="$dmg_mb_fmt" -v b="$baseline" 'BEGIN {exit (t > b*1.5) ? 0 : 1}'; then
                echo "::warning::DMG is >50% larger than baseline (${dmg_mb_fmt}MB vs ${baseline}MB, ${ratio}x). Investigate unpinned deps, asarUnpack, or unbuilt source maps."
              fi
            fi
          fi

      - name: Upload macOS DMG (arm64 — Apple Silicon)
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-macOS-arm64-${{ github.sha }}
          path: apps/desktop/release/Hermes-*-mac-arm64.dmg
          retention-days: 30
          if-no-files-found: error

      - name: Upload macOS DMG (x64 — Intel)
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-macOS-x64-${{ github.sha }}
          path: apps/desktop/release/Hermes-*-mac-x64.dmg
          retention-days: 30
          if-no-files-found: error

      - name: Upload macOS zip (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-macOS-zip-arm64-${{ github.sha }}
          path: apps/desktop/release/Hermes-*-mac-arm64.zip
          retention-days: 30
          if-no-files-found: warn

      - name: Upload macOS zip (x64)
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-macOS-zip-x64-${{ github.sha }}
          path: apps/desktop/release/Hermes-*-mac-x64.zip
          retention-days: 30
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────
  # Windows (NSIS installer + MSI) — produces per-arch installers
  # x64 on windows-latest, arm64 on windows-11-arm
  # ────────────────────────────────────────────────────────
  windows:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            artifact_suffix: x64
          - arch: arm64
            runner: windows-11-arm
            artifact_suffix: arm64
    name: windows-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps
        run: npm ci

      - name: Build & package (NSIS + MSI) for ${{ matrix.arch }}
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:win

      - name: Report artifact sizes (Windows ${{ matrix.arch }})
        if: always()
        shell: pwsh
        env:
          BASELINE_DMG_MB: ${{ github.event.inputs.baseline_dmg_mb }}
          REPORT_ARCH: ${{ matrix.arch }}
        run: |
          Write-Host "===== Windows artifact sizes (arch: $env:REPORT_ARCH) ====="

          $releaseDir = 'apps/desktop/release'
          if (-not (Test-Path -LiteralPath $releaseDir)) {
            Write-Host "::warning::Release directory not found: $releaseDir"
          } else {
            $files = @()
            foreach ($ext in @('*.exe', '*.msi')) {
              $files += Get-ChildItem -LiteralPath $releaseDir -Filter $ext -File -ErrorAction SilentlyContinue
            }
            foreach ($f in $files) {
              $mb = [math]::Round($f.Length/1MB, 1)
              Write-Host ("  {0,-50}  {1,12:N0} bytes  ({2,6:N1} MB)" -f $f.Name, $f.Length, $mb)
            }

            $totalBytes = ($files | Measure-Object -Property Length -Sum).Sum
            if ($null -eq $totalBytes) { $totalBytes = 0 }
            $totalMb = [math]::Round($totalBytes/1MB, 1)
            Write-Host "TOTAL=$totalMb MB"
          }

          $baseline = $env:BASELINE_DMG_MB
          if (-not [string]::IsNullOrWhiteSpace($baseline)) {
            Write-Host "BASELINE=${baseline}MB (informational only; macOS job enforces)"
          }

      - name: Upload NSIS installer (${{ matrix.arch }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Windows-${{ matrix.artifact_suffix }}-${{ github.sha }}
          path: apps/desktop/release/Hermes-*-win-${{ matrix.arch }}.exe
          retention-days: 30
          if-no-files-found: error

      - name: Upload MSI installer (${{ matrix.arch }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Windows-MSI-${{ matrix.artifact_suffix }}-${{ github.sha }}
          path: apps/desktop/release/Hermes-*-win-${{ matrix.arch }}.msi
          retention-days: 30
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────
  # Linux (AppImage + deb + rpm)
  # ────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system deps (for AppImage/deb/rpm)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools rpm fakeroot dpkg

      - name: Install workspace deps
        run: npm ci

      - name: Build & package (AppImage + deb + rpm)
        working-directory: apps/desktop
        run: npm run dist:linux

      - name: Report artifact sizes (Linux)
        if: always()
        working-directory: apps/desktop/release
        run: |
          set -euo pipefail
          echo "===== Linux artifact sizes ====="
          shopt -s nullglob

          # Use wc -c instead of stat -c %s for portability across GNU/BSD coreutils.
          for f in *.AppImage *.deb *.rpm; do
            [[ -f "$f" ]] || continue
            bytes=$(wc -c < "$f" | tr -d ' ')
            mb=$(awk -v b="$bytes" 'BEGIN {printf "%.1f", b/1024/1024}')
            printf "  %-50s  %10s bytes  (%6s MB)\n" "$f" "$bytes" "$mb"
          done

          total_bytes=$(find . -maxdepth 1 -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) -print0 2>/dev/null \
            | xargs -0 wc -c 2>/dev/null \
            | tail -n 1 \
            | awk '{print $1}')
          total_bytes=${total_bytes:-0}
          total_mb=$(awk -v b="$total_bytes" 'BEGIN {printf "%.1f", b/1024/1024}')
          echo "TOTAL=${total_mb}MB"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Linux-AppImage-${{ github.sha }}
          path: apps/desktop/release/Hermes-*.AppImage
          retention-days: 30

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Linux-deb-${{ github.sha }}
          path: apps/desktop/release/Hermes-*.deb
          retention-days: 30

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Linux-rpm-${{ github.sha }}
          path: apps/desktop/release/Hermes-*.rpm
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # 打 tag 时自动创建 GitHub Release（draft）
  # ────────────────────────────────────────────────────────
  release:
    needs: [macos, windows, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create/update GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
